receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317
  mongodb:
    hosts:
      - endpoint: ${env:MONGODB_ENDPOINT}
    replica_set: rs0
    direct_connection: true
    timeout: 30s
    collection_interval: 30s
    initial_delay: 30s
    tls:
      insecure: true
      insecure_skip_verify: true

processors:
  batch: {}

exporters:
  debug/detailed:
    verbosity: detailed
  debug/minimal:
    verbosity: basic
  nop: {}

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug/detailed]
    metrics:
      receivers: [otlp, mongodb]
      processors: [batch]
      exporters: [debug/minimal]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug/detailed]
